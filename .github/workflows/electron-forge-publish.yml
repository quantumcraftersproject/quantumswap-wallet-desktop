name: Build/release

on:
  push:
    tags:
      - '*'    

jobs:
  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 LTS: appdmg (native addon for DMG) often fails to build on Node 21+ / newer Xcode.
          node-version: '20'
          cache: npm

      # Lockfile is generated with npm 10; npm 11 can produce trees npm 10's `npm ci` rejects ("Missing: glob@…").
      - name: Use npm 10 for install
        run: npm install -g npm@10.9.2

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install DMG dependencies
        if: matrix.os == 'macos-latest'
        env:
          PYTHON: python3
          npm_config_python: python3
        run: npm install --no-save appdmg@0.6.6 --foreground-scripts

      - name: Publish
        run: npm run publish

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: |
            out/make/squirrel.windows/x64/*.exe,
            out/make/*.dmg
